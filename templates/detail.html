        .token-chip.kept { background: #efe; border-color: #cfc; }
        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .acc-content.open { max-height: 8000px; }
        .code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 16px; font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre; margin-top: 8px; border: 1px solid #313244; }

        .code-toggle:hover { background: #e8e8e8; color: #333; }
        .code-toggle.active { background: #1e1e2e; color: #cdd6f4; border-color: #313244; }
        .code-wrapper { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .code-wrapper.open { max-height: 3000px; }
        .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }

        .modal-box { background: white; border-radius: 16px; max-width: 640px; width: 92%; max-height: 85vh; overflow-y: auto; padding: 0; transform: translateY(20px) scale(0.97); transition: transform 0.25s ease; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }

        .info-btn:hover { background: #171717; color: white; border-color: #171717; }
        .text-viewer { max-height: 300px; overflow-y: auto; transition: max-height 0.3s ease; }
        .text-viewer.expanded { max-height: none; }
        .text-expand-btn { cursor: pointer; color: #525252; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; padding: 4px 10px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 6px; transition: all 0.2s; }

        localStorage.setItem('nlp_lang', currentLang);
        document.getElementById('lang-label').textContent = currentLang==='id'?'EN':'ID';
        document.documentElement.lang = currentLang;
        applyLang();
    }
    function applyLang() {
        document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
        document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
        // Re-render content
        const step = '{{ step }}';
        if(step === 'preprocessing' && _data) renderPreprocessing(_data);
        else if(step === 'summarization' && _data) renderSummarization(_data);
        else if(step === 'evaluation' && _data) renderEvaluation(_data);
        lucide.createIcons();
    }

    // --- STATE ---
    const _step = '{{ step }}';
    let _data = null;
    let appState = { texts: [], summaries: [], currentDocIndex: 0, summarizeResult: null };

    // --- SHARED HELPERS ---
    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    function getExplanation(key) {
        const map = {
            'case_folding': { title: t('expl.cf.title'), icon: 'type', desc: t('expl.cf.desc'), detail: t('expl.cf.detail'), example: '"UNIVERSITAS Hasanuddin" → "universitas hasanuddin"' },
            'cleaning': { title: t('expl.cl.title'), icon: 'eraser', desc: t('expl.cl.desc'), detail: t('expl.cl.detail'), example: '"NLP ver.2.0 (Natural!)" → "NLP ver Natural"' },
            'sentence_tokenize': { title: t('expl.st.title'), icon: 'split', desc: t('expl.st.desc'), detail: t('expl.st.detail'), example: '"Saya belajar. Dia bekerja." → ["Saya belajar", "Dia bekerja"]' },
            'word_tokenize': { title: t('expl.wt.title'), icon: 'text-cursor-input', desc: t('expl.wt.desc'), detail: t('expl.wt.detail'), example: '"saya belajar nlp" → ["saya", "belajar", "nlp"]' },
            'stopword_removal': { title: t('expl.sw.title'), icon: 'filter', desc: t('expl.sw.desc'), detail: t('expl.sw.detail'), example: '"dia pergi ke rumah yang besar" → ["pergi", "rumah", "besar"]' },
            'stemming': { title: t('expl.sm.title'), icon: 'scissors', desc: t('expl.sm.desc'), detail: t('expl.sm.detail'), example: '"pembelajaran" → "ajar", "berlari" → "lari"' },
            'extractive': { title: t('expl.ext.title'), icon: 'list-ordered', desc: t('expl.ext.desc'), detail: t('expl.ext.detail'), example: t('expl.ext.example') },
            'abstractive': { title: t('expl.abs.title'), icon: 'brain', desc: t('expl.abs.desc'), detail: t('expl.abs.detail'), example: t('expl.abs.example') },
            'rouge': { title: t('expl.rouge.title'), icon: 'bar-chart-2', desc: t('expl.rouge.desc'), detail: t('expl.rouge.detail'), example: t('expl.rouge.example') }
        };
        return map[key] || null;
    }

    const SOURCE_CODE = {
        'case_folding': `# src/preprocessor.py \u2014 Case Folding\ndef case_folding(self, text: str) -> str:\n    """Mengubah semua huruf menjadi lowercase."""\n    if not text:\n        return ""\n    return text.lower()`,
        'cleaning': `# src/preprocessor.py \u2014 Cleaning\ndef clean_text(self, text: str) -> str:\n    if not text:\n        return ""\n    text = re.sub(r"https?://\\S+|www\\.\\S+", " ", text)\n    text = re.sub(r"\\S+@\\S+\\.\\S+", " ", text)\n    text = re.sub(r"<[^>]+>", " ", text)\n    text = re.sub(r"[^a-zA-Z\\s.?!]", " ", text)\n    text = re.sub(r"\\s+", " ", text).strip()\n    return text`,
        'sentence_tokenize': `# src/preprocessor.py \u2014 Tokenisasi Kalimat\nfrom nltk.tokenize import sent_tokenize\n\ndef sentence_tokenize(self, text: str) -> List[str]:\n    if not text:\n        return []\n    sentences = sent_tokenize(text, language="indonesian")\n    sentences = [s.strip() for s in sentences if s.strip()]\n    return sentences`,
        'word_tokenize': `# src/preprocessor.py \u2014 Tokenisasi Kata\nfrom nltk.tokenize import word_tokenize\n\ndef word_tokenize(self, text: str) -> List[str]:\n    if not text:\n        return []\n    tokens = word_tokenize(text, language="indonesian")\n    return tokens`,
        'stopword_removal': `# src/preprocessor.py \u2014 Stopword Removal\nfrom nltk.corpus import stopwords\n\ndef remove_stopwords(self, tokens: List[str]) -> List[str]:\n    if not tokens:\n        return []\n    filtered = [\n        token for token in tokens\n        if token.lower() not in self.indonesian_stopwords\n        and len(token) > 1\n    ]\n    return filtered`,
        'stemming': `# src/preprocessor.py \u2014 Stemming\nfrom Sastrawi.Stemmer.StemmerFactory import StemmerFactory\n\ndef stem_tokens(self, tokens: List[str]) -> List[str]:\n    if not tokens:\n        return []\n    stemmed = [self.stemmer.stem(token) for token in tokens]\n    return stemmed`,
        'extractive': `# src/extractive_model.py \u2014 Extractive Summarization\nfrom sklearn.feature_extraction.text import TfidfVectorizer\nfrom sklearn.metrics.pairwise import cosine_similarity\nimport networkx as nx\n\ndef summarize(self, text, num_sentences=None):\n    sentences = self._get_sentences(text)\n    vectorizer = TfidfVectorizer(max_features=self.max_features)\n    tfidf_matrix = vectorizer.fit_transform(sentences)\n    similarity_matrix = cosine_similarity(tfidf_matrix)\n    graph = nx.from_numpy_array(similarity_matrix)\n    scores = nx.pagerank(graph, weight="weight")\n    ranked = sorted(scores, key=scores.get, reverse=True)\n    top_indices = sorted(ranked[:num_sentences])\n    summary = " ".join([sentences[i] for i in top_indices])\n    return summary`,
        'abstractive': `# src/abstractive_model.py \u2014 Abstractive Summarization\nfrom transformers import AutoTokenizer, AutoModelForSeq2SeqLM\n\ndef summarize(self, texts):\n    inputs = self.tokenizer(\n        texts, max_length=512,\n        truncation=True, padding=True,\n        return_tensors="pt"\n    ).to(self.device)\n    outputs = self.model.generate(\n        **inputs,\n        num_beams=4,\n        max_length=150,\n        early_stopping=True\n    )\n    summaries = self.tokenizer.batch_decode(\n        outputs, skip_special_tokens=True\n    )\n    return summaries`,
        'rouge': `# src/evaluator.py \u2014 ROUGE Evaluation\nfrom rouge_score import rouge_scorer\n\ndef compute_rouge(self, predictions, references):\n    scorer = rouge_scorer.RougeScorer(\n        ["rouge1", "rouge2", "rougeL"],\n        use_stemmer=False\n    )\n    for pred, ref in zip(predictions, references):\n        scores = scorer.score(ref, pred)\n        for metric in self.rouge_metrics:\n            precision = scores[metric].precision\n            recall = scores[metric].recall\n            fmeasure = scores[metric].fmeasure\n    avg_scores = {metric: {\n        "precision": mean(precisions),\n        "recall": mean(recalls),\n        "fmeasure": mean(fmeasures)\n    } for metric in metrics}\n    return avg_scores`
    };

    function highlightPython(code) {
        code = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const ph = [];
        const save = (h) => { ph.push(h); return '~PH' + (ph.length-1) + '~'; };
        code = code.replace(/(#[^\n]*)/g, (m) => save('<span class="cm">' + m + '</span>'));
        code = code.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, (m) => save('<span class="st">' + m + '</span>'));
        code = code.replace(/\b(def|class|if|else|elif|return|for|in|not|and|or|import|from|as|try|except|with|True|False|None|self)\b/g, '<span class="kw">$1</span>');
        code = code.replace(/\b(str|int|float|list|dict|tuple|set|bool|len|print|range|zip|sum|sorted|type)\b/g, '<span class="nb">$1</span>');
        code = code.replace(/(class="kw">def<\/span>\s+)(\w+)/g, '$1<span class="fn">$2</span>');
        code = code.replace(/~PH(\d+)~/g, (_, i) => ph[parseInt(i)]);
        return code;
    }

    function buildCodeBlock(key) {
        const code = SOURCE_CODE[key];
        if (!code) return '';
        const id = 'code-' + key + '-' + Math.random().toString(36).substr(2, 5);
        return '<button class="code-toggle" onclick="toggleCodeBlock(\'' + id + '\', this)"><i data-lucide="code-2" class="w-3 h-3"></i> ' + t('btn.show_code') + '</button>' +
            '<div class="code-wrapper" id="' + id + '"><div class="code-block">' + highlightPython(code) + '</div></div>';
    }

    function buildStepExplanation(key) {
        const info = getExplanation(key);
        if (!info) return '';
        return '<div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mt-3">' +
            '<p class="text-xs font-bold text-amber-700 mb-1 flex items-center gap-1"><i data-lucide="lightbulb" class="w-3.5 h-3.5"></i> ' + t('what.happened') + '</p>' +
            '<p class="text-xs text-amber-800 leading-relaxed">' + info.detail + '</p>' +
            (info.example ? '<div class="mt-2 bg-white/60 rounded px-2 py-1.5 text-xs font-mono text-amber-900">' + info.example + '</div>' : '') +
            '</div>';
    }

    function toggleCodeBlock(id, btn) {
        const el = document.getElementById(id);
        el.classList.toggle('open');
        btn.classList.toggle('active');
        btn.innerHTML = el.classList.contains('open')
            ? '<i data-lucide="code-2" class="w-3 h-3"></i> ' + t('btn.hide_code')
            : '<i data-lucide="code-2" class="w-3 h-3"></i> ' + t('btn.show_code');
        lucide.createIcons();
    }

    function buildTextViewer(text, maxHeight = 300) {
        const id = 'tv-' + Math.random().toString(36).substr(2, 8);
        const needsExpand = text.length > 500;
        return `<div class="text-viewer${needsExpand ? '' : ' expanded'}" id="${id}" style="max-height: ${needsExpand ? maxHeight + 'px' : 'none'}"><p class="text-sm leading-relaxed text-dark-700 whitespace-pre-wrap">${escapeHtml(text)}</p></div>${needsExpand ? `<div class="text-expand-btn" onclick="toggleTextViewer('${id}', this)"><i data-lucide="chevron-down" class="w-3 h-3"></i> ${t('btn.show_all')}</div>` : ''}`;
    }
    function toggleTextViewer(id, btn) {
        const el = document.getElementById(id);
        el.classList.toggle('expanded');
        if(el.classList.contains('expanded')) { el.style.maxHeight = 'none'; btn.innerHTML = '<i data-lucide="chevron-up" class="w-3 h-3"></i> ' + t('btn.hide'); }
        else { el.style.maxHeight = '300px'; btn.innerHTML = '<i data-lucide="chevron-down" class="w-3 h-3"></i> ' + t('btn.show_all'); }
        lucide.createIcons();
    }

    function buildDocTabs(texts, callback) {
        if(texts.length === 1) return '';
        let html = '<div class="flex flex-wrap gap-1 mb-4">';
        texts.forEach((_, i) => { html += `<button onclick="${callback}(${i})" class="doc-tab-btn px-3 py-1.5 rounded-lg text-xs font-medium ${i === appState.currentDocIndex ? 'bg-dark-900 text-white' : 'bg-dark-100 text-dark-600 hover:bg-dark-200'} transition-all">${t('doc')} ${i + 1}</button>`; });
        return html + '</div>';
    }

    function toggleAcc(id) { const el = document.getElementById(id); el.classList.toggle('open'); }

    function showExplanation(key) {
        const info = getExplanation(key); if(!info) return;
        document.getElementById('modal-title').textContent = info.title;
        document.getElementById('modal-icon').innerHTML = `<i data-lucide="${info.icon}" class="w-5 h-5"></i>`;
        let body = `<div class="space-y-4"><p class="text-sm text-dark-600">${info.desc}</p><div class="text-sm leading-relaxed text-dark-700">${info.detail}</div>`;
        if(info.example) body += `<div class="bg-dark-50 border border-dark-200 rounded-lg px-4 py-3"><p class="text-xs font-semibold text-dark-500 mb-1">${t('modal.example')}</p><p class="text-sm font-mono">${info.example}</p></div>`;
        body += '</div>';
        document.getElementById('modal-body').innerHTML = body;
        document.getElementById('explanation-modal').classList.add('open');
        lucide.createIcons();
    }
    function closeModal() { document.getElementById('explanation-modal').classList.remove('open'); }
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

    // --- RENDER: PREPROCESSING ---
    function renderPreprocessing(data) {
        const results = data.results || [data];
        const container = document.getElementById('detail-content');
        let html = '<div class="border border-purple-200 rounded-2xl overflow-hidden shadow-sm"><div class="bg-gradient-to-r from-purple-50 to-white px-6 py-4 border-b border-purple-200"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-purple-600 text-white flex items-center justify-center text-sm font-bold">1</div><div><h2 class="font-bold text-lg">Preprocessing</h2><p class="text-xs text-dark-400" data-i18n="result.preprocess.desc">' + t('result.preprocess.desc') + '</p></div></div></div><div class="p-6">';

        html += buildDocTabs(results, 'switchPreprocessDoc');

        const r = results[appState.currentDocIndex] || results[0];
        const origTokens = r.original ? r.original.split(/\s+/).length : 0;
        const afterTokens = r.num_tokens_stemmed || 0;
        const removed = origTokens > 0 ? origTokens - afterTokens : 0;
        const reduction = origTokens > 0 ? Math.round((removed / origTokens) * 100) : 0;

        html += `<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="bg-purple-50 border border-purple-200 rounded-xl p-4 text-center"><p class="text-2xl font-bold text-purple-700">${r.num_sentences || (r.sentences ? r.sentences.length : '-')}</p><p class="text-xs text-purple-500 mt-1">${t('stat.sentences')}</p></div>
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center"><p class="text-2xl font-bold text-blue-700">${origTokens}</p><p class="text-xs text-blue-500 mt-1">${t('stat.tokens')}</p></div>
            <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center"><p class="text-2xl font-bold text-emerald-700">${afterTokens}</p><p class="text-xs text-emerald-500 mt-1">${t('stat.after')}</p></div>
            <div class="bg-rose-50 border border-rose-200 rounded-xl p-4 text-center"><p class="text-2xl font-bold text-rose-700">${reduction}%</p><p class="text-xs text-rose-500 mt-1">${t('stat.reduction')}</p></div>
        </div>`;

        html += `<div class="bg-dark-50 rounded-xl border border-dark-200 p-4 mb-6"><div class="flex flex-wrap items-center justify-center gap-2 text-xs font-medium">
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full">Case Folding</span><span class="text-dark-300">→</span>
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full">Cleaning</span><span class="text-dark-300">→</span>
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full">${t('step.st')}</span><span class="text-dark-300">→</span>
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full">${t('step.wt')}</span><span class="text-dark-300">→</span>
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full">Stopword Removal</span><span class="text-dark-300">→</span>
            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full">Stemming</span>
        </div></div>`;

        const steps = [
            { key: 'case_folding', label: 'Case Folding', data: r.case_folding, icon: 'type', desc: t('step.cf.desc') },
            { key: 'cleaning', label: 'Cleaning', data: r.cleaning, icon: 'eraser', desc: t('step.cl.desc') },
            { key: 'sentence_tokenize', label: t('step.st'), data: r.sentences, icon: 'split', desc: t('step.st.desc'), isList: true },
            { key: 'word_tokenize', label: t('step.wt'), data: r.word_tokens, icon: 'text-cursor-input', desc: t('step.wt.desc'), isTokens: true },
            { key: 'stopword_removal', label: 'Stopword Removal', data: r.after_stopword_removal, icon: 'filter', desc: t('step.sw.desc'), isTokens: true },
            { key: 'stemming', label: 'Stemming', data: r.after_stemming, icon: 'scissors', desc: t('step.sm.desc'), isTokens: true }
        ];

        html += `<div class="mb-4"><div class="flex items-center gap-2 mb-2"><span class="font-semibold text-sm">${t('label.original')}</span></div>${buildTextViewer(r.original || '-')}</div><hr class="border-dark-100 my-4">`;

        steps.forEach((step, i) => {
            const accId = 'acc-' + step.key + '-' + Math.random().toString(36).substr(2, 5);
            html += `<div class="border border-dark-100 rounded-xl mb-3 overflow-hidden">
                <button class="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-dark-50 transition-colors" onclick="toggleAcc('${accId}')">
                    <span class="w-7 h-7 rounded-lg bg-purple-100 text-purple-700 flex items-center justify-center text-xs font-bold">${i + 1}</span>

                    <span class="info-btn" onclick="event.stopPropagation();showExplanation('${step.key}')" title="${t('tooltip.explain')}">?</span>

                </button>
                <div class="acc-content open" id="${accId}"><div class="px-4 pb-4 pt-1">`;

            if(step.isList && Array.isArray(step.data)) {
                html += `<p class="text-xs text-dark-500 mb-2">${step.data.length} ${t('sentences_found')}</p><div class="space-y-1">`;

                html += '</div>';
            } else {
                html += buildTextViewer(String(step.data || '-'));
            }
            html += buildStepExplanation(step.key);
            html += buildCodeBlock(step.key);
            html += '</div></div></div>';
        });

        html += '</div></div>';
        container.innerHTML = html;
        lucide.createIcons();
    }
    function switchPreprocessDoc(idx) {
        appState.currentDocIndex = idx;
        renderPreprocessing(_data);
    }

    // --- RENDER: SUMMARIZATION ---
    function renderSummarization(data) {
        const numDocs = appState.texts.length;
        const extArr = data.extractive || [];
        const absArr = data.abstractive || [];
        const llmArr = data.llm || [];
        const hasLlm = llmArr.length > 0;
        const idx = appState.currentDocIndex;
        const container = document.getElementById('detail-content');

        const docResults = [];
        for(let i = 0; i < numDocs; i++) {
            docResults.push({ extractive: extArr[i] || '-', abstractive: absArr[i] || '-', llm: llmArr[i] || null, reference: appState.summaries[i] || null });
        }

        let html = '<div class="border border-emerald-200 rounded-2xl overflow-hidden shadow-sm"><div class="bg-gradient-to-r from-emerald-50 to-blue-50 px-6 py-4 border-b border-emerald-200"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-emerald-600 text-white flex items-center justify-center text-sm font-bold">2</div><div><h2 class="font-bold text-lg">Summarization</h2><p class="text-xs text-dark-400">' + t('result.sum.desc') + '</p></div></div></div><div class="p-6">';

            <div class="bg-emerald-50 rounded-xl border border-emerald-200 p-4">
                <p class="text-xs font-bold text-emerald-700 mb-2">${t('ext.pipeline')}</p>
                <div class="flex flex-wrap items-center gap-1 text-[11px] font-medium">
                    <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">${t('flow.tokenize')}</span><span class="text-emerald-300">→</span>
                    <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">TF-IDF</span><span class="text-emerald-300">→</span>
                    <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">Cosine Sim</span><span class="text-emerald-300">→</span>
                    <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">PageRank</span><span class="text-emerald-300">→</span>
                    <span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full">${t('flow.selection')}</span>

            </div>
            <div class="bg-blue-50 rounded-xl border border-blue-200 p-4">
                <p class="text-xs font-bold text-blue-700 mb-2">${t('abs.pipeline')}</p>
                <div class="flex flex-wrap items-center gap-1 text-[11px] font-medium">
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">${t('flow.tokenize')}</span><span class="text-blue-300">→</span>
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">Encoder</span><span class="text-blue-300">→</span>
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">Decoder</span><span class="text-blue-300">→</span>
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">Beam Search</span><span class="text-blue-300">→</span>
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">Decode</span>
                </div>
            </div>
            ${hasLlm ? `<div class="bg-amber-50 rounded-xl border border-amber-200 p-4">
                <p class="text-xs font-bold text-amber-700 mb-2">${t('llm.pipeline')}</p>
                <div class="flex flex-wrap items-center gap-1 text-[11px] font-medium">
                    <span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">${t('flow.userinput')}</span><span class="text-amber-300">→</span>

            </div>` : ''}

        // All results expanded (no tabs on detail page — show everything)
        html += `<div class="space-y-4">`;

        // Extractive
        html += `<div class="border border-emerald-200 rounded-xl p-5">

        // Abstractive
        html += `<div class="border border-blue-200 rounded-xl p-5">
            <div class="flex items-center gap-2 mb-3"><i data-lucide="brain" class="w-5 h-5 text-blue-600"></i><span class="font-semibold text-sm">${t('result.abs')}</span>
            <span class="info-btn" onclick="showExplanation('abstractive')" title="${t('tooltip.explain')}">?</span></div>
            ${buildTextViewer(r.abstractive || '-')}
            <p class="text-xs text-dark-400 mt-3">${t('generated_by')}</p>
            ${buildStepExplanation('abstractive')}
            ${buildCodeBlock('abstractive')}
        </div>`;

        // LLM
        if(hasLlm) {
            html += `<div class="border border-amber-200 rounded-xl p-5">
                <div class="flex items-center gap-2 mb-3"><i data-lucide="sparkles" class="w-5 h-5 text-amber-600"></i><span class="font-semibold text-sm">${t('result.llm')}</span></div>
                ${buildTextViewer(r.llm || '-')}
                <p class="text-xs text-dark-400 mt-3">${t('llm.note')}</p>
            </div>`;
        }

        // Side by side comparison
        html += `<h3 class="font-bold text-sm mt-6 mb-3">${t('compare')}</h3>`;
        html += `<div class="grid md:grid-cols-${hasLlm ? '3' : '2'} gap-4">
            <div class="compare-card p-5"><div class="flex items-center gap-2 mb-3"><div class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-700 flex items-center justify-center"><i data-lucide="list-ordered" class="w-4 h-4"></i></div><span class="font-semibold text-sm text-emerald-800">Extractive</span></div>${buildTextViewer(r.extractive || '-', 300)}<p class="text-xs text-dark-400 mt-3">${(r.extractive || '').length} ${t('chars')}</p></div>
            <div class="compare-card p-5"><div class="flex items-center gap-2 mb-3"><div class="w-8 h-8 rounded-lg bg-blue-100 text-blue-700 flex items-center justify-center"><i data-lucide="brain" class="w-4 h-4"></i></div><span class="font-semibold text-sm text-blue-800">Abstractive</span></div>${buildTextViewer(r.abstractive || '-', 300)}<p class="text-xs text-dark-400 mt-3">${(r.abstractive || '').length} ${t('chars')}</p></div>
            ${hasLlm ? `<div class="compare-card p-5"><div class="flex items-center gap-2 mb-3"><div class="w-8 h-8 rounded-lg bg-amber-100 text-amber-700 flex items-center justify-center"><i data-lucide="sparkles" class="w-4 h-4"></i></div><span class="font-semibold text-sm text-amber-800">LLM</span></div>${buildTextViewer(r.llm || '-', 300)}<p class="text-xs text-dark-400 mt-3">${(r.llm || '').length} ${t('chars')}</p></div>` : ''}
        </div>`;

        // Reference
        if(r.reference) {
            html += `<div class="mt-4 border border-dark-200 rounded-xl p-5"><div class="flex items-center gap-2 mb-3"><i data-lucide="bookmark" class="w-5 h-5 text-dark-500"></i><span class="font-semibold text-sm">${t('label.ref')}</span></div>${buildTextViewer(r.reference || '-')}</div>`;
        }

        html += '</div></div></div>';
        container.innerHTML = html;
        lucide.createIcons();
    }
    function switchSummaryDoc(idx) {
        appState.currentDocIndex = idx;
        renderSummarization(_data);
    }

    // --- RENDER: EVALUATION ---
    function renderEvaluation(data) {
        const perDoc = data.per_document || [];
        const idx = appState.currentDocIndex;
        const container = document.getElementById('detail-content');

        let html = '<div class="border border-rose-200 rounded-2xl overflow-hidden shadow-sm"><div class="bg-gradient-to-r from-rose-50 to-white px-6 py-4 border-b border-rose-200"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-rose-600 text-white flex items-center justify-center text-sm font-bold">3</div><div><h2 class="font-bold text-lg">' + t('result.eval.title') + '</h2><p class="text-xs text-dark-400">' + t('result.eval.desc') + '</p></div></div></div><div class="p-6">';

        html += buildDocTabs(perDoc, 'switchEvalDoc');
        const r = perDoc[idx] || perDoc[0] || {};

        html += `<div class="flex items-center gap-2 mb-6"><i data-lucide="bar-chart-2" class="w-5 h-5 text-rose-600"></i><span class="font-semibold text-sm">${t('rouge.scores')}</span><span class="info-btn" onclick="showExplanation('rouge')" title="${t('tooltip.explain')}">?</span></div>`;

        html += `<div class="bg-dark-50 border border-dark-200 rounded-xl p-4 mb-6 text-xs text-dark-600">
            <p class="font-semibold text-dark-700 mb-2">${t('rouge.howto')}</p>
            <div class="grid md:grid-cols-3 gap-3">
                <div><strong>Precision</strong>: ${t('rouge.p')}</div>
                <div><strong>Recall</strong>: ${t('rouge.r')}</div>
                <div><strong>F1-Score</strong>: ${t('rouge.f')}</div>
            </div>
        </div>`;

        html += buildCodeBlock('rouge');

        const ext = r.ext || {};
        const abs = r.abs || {};

        html += `<div class="space-y-4 mb-6">`;
        ['rouge1', 'rouge2', 'rougeL'].forEach(metric => {
            const eF1 = ext[metric] ? (ext[metric].f * 100).toFixed(1) : 0;
            const aF1 = abs[metric] ? (abs[metric].f * 100).toFixed(1) : 0;
            const metricLabel = metric === 'rouge1' ? 'ROUGE-1' : metric === 'rouge2' ? 'ROUGE-2' : 'ROUGE-L';
            html += `<div>
                <p class="text-xs font-bold text-dark-600 mb-2">${metricLabel}</p>
                <div class="space-y-1">
                    <div class="flex items-center gap-2"><span class="text-xs text-emerald-600 font-medium w-20">Extractive</span><div class="flex-1 bg-dark-100 rounded-full h-6 relative overflow-hidden"><div class="bg-emerald-500 h-6 rounded-full flex items-center justify-end pr-2 text-white text-[11px] font-bold transition-all duration-700" style="width: ${eF1}%">${eF1}%</div></div></div>
                    <div class="flex items-center gap-2"><span class="text-xs text-blue-600 font-medium w-20">Abstractive</span><div class="flex-1 bg-dark-100 rounded-full h-6 relative overflow-hidden"><div class="bg-blue-500 h-6 rounded-full flex items-center justify-end pr-2 text-white text-[11px] font-bold transition-all duration-700" style="width: ${aF1}%">${aF1}%</div></div></div>
                </div>
            </div>`;
        });
        html += `</div>`;

        const methodTables = [{ label: 'Extractive', data: ext, color: 'emerald' }, { label: 'Abstractive', data: abs, color: 'blue' }];
        html += `<div class="grid md:grid-cols-2 gap-4">`;
        methodTables.forEach(({ label, data: d, color }) => {
            html += `<div class="border border-${color}-200 rounded-xl overflow-hidden"><div class="bg-${color}-50 px-4 py-2 border-b border-${color}-200"><span class="font-semibold text-sm text-${color}-800">${label}</span></div>
            <table class="w-full text-xs"><thead><tr class="border-b border-dark-100"><th class="px-4 py-2 text-left font-medium text-dark-500">${t('table.metric')}</th><th class="px-4 py-2 text-right font-medium text-dark-500">Precision</th><th class="px-4 py-2 text-right font-medium text-dark-500">Recall</th><th class="px-4 py-2 text-right font-medium text-dark-500">F1</th></tr></thead><tbody>`;
            ['rouge1', 'rouge2', 'rougeL'].forEach(m => {
                const v = d[m] || { p: 0, r: 0, f: 0 };
                const mLabel = m === 'rouge1' ? 'ROUGE-1' : m === 'rouge2' ? 'ROUGE-2' : 'ROUGE-L';
                html += `<tr class="border-b border-dark-50"><td class="px-4 py-2 font-medium">${mLabel}</td><td class="px-4 py-2 text-right font-mono">${(v.p * 100).toFixed(2)}%</td><td class="px-4 py-2 text-right font-mono">${(v.r * 100).toFixed(2)}%</td><td class="px-4 py-2 text-right font-mono font-bold">${(v.f * 100).toFixed(2)}%</td></tr>`;
            });
            html += '</tbody></table></div>';
        });
        html += '</div>';

        html += '</div></div>';
        container.innerHTML = html;

        // Render comparison below
        renderComparison(r);
        lucide.createIcons();
    }

    function renderComparison(r) {
        const ext = r.ext || {};
        const abs = r.abs || {};
        const extAvg = (['rouge1','rouge2','rougeL'].reduce((s, m) => s + ((ext[m]||{}).f||0), 0) / 3 * 100).toFixed(2);
        const absAvg = (['rouge1','rouge2','rougeL'].reduce((s, m) => s + ((abs[m]||{}).f||0), 0) / 3 * 100).toFixed(2);
        const candidates = { extractive: parseFloat(extAvg), abstractive: parseFloat(absAvg) };
        const winner = Object.entries(candidates).sort((a,b) => b[1]-a[1])[0][0];
        const wLabel = winner === 'extractive' ? 'Extractive' : 'Abstractive';
        const wColor = winner === 'extractive' ? 'emerald' : 'blue';
        const wIcon = winner === 'extractive' ? 'list-ordered' : 'brain';
        const wAvg = candidates[winner].toFixed(2);

        const llmArr = appState.summarizeResult?.llm || [];
        const hasLlm = llmArr.length > 0;
        const llmText = llmArr[appState.currentDocIndex] || '';

        const comp = document.getElementById('detail-comparison');
        comp.classList.remove('hidden');
        comp.innerHTML = `<div class="border-2 border-dark-900 rounded-2xl overflow-hidden shadow-lg fade-in">
            <div class="bg-dark-900 text-white px-6 py-5"><div class="flex items-center gap-3"><i data-lucide="trophy" class="w-6 h-6 text-yellow-400"></i><h2 class="text-lg font-bold">${t('conclusion')}</h2></div></div>
            <div class="p-6">
                <div class="text-center mb-6">
                    <div class="inline-flex items-center gap-3 bg-${wColor}-50 border-2 border-${wColor}-300 rounded-2xl px-8 py-4">
                        <i data-lucide="${wIcon}" class="w-8 h-8 text-${wColor}-600"></i>
                        <div class="text-left"><p class="text-xs text-${wColor}-600 font-medium">${t('best_method')}</p><p class="text-2xl font-bold text-${wColor}-800">${wLabel}</p></div>
                        <span class="bg-${wColor}-600 text-white px-3 py-1 rounded-full text-sm font-bold">${wAvg}%</span>
                    </div>
                </div>
                <div class="grid md:grid-cols-3 gap-4 mb-6">
                    ${['rouge1','rouge2','rougeL'].map(m => {
                        const eF = ((ext[m]||{}).f||0)*100;
                        const aF = ((abs[m]||{}).f||0)*100;
                        const scores = [{key:'ext',val:eF,color:'emerald',label:'Ext'},{key:'abs',val:aF,color:'blue',label:'Abs'}];
                        const maxVal = Math.max(...scores.map(s=>s.val));
                        const mLabel = m === 'rouge1' ? 'ROUGE-1' : m === 'rouge2' ? 'ROUGE-2' : 'ROUGE-L';
                        return `<div class="bg-dark-50 rounded-xl p-4 text-center"><p class="text-xs font-bold text-dark-500 mb-2">${mLabel}</p>
                            <div class="flex items-center justify-center gap-2">${scores.map(s =>
                                `<div class="${s.val>=maxVal?`bg-${s.color}-100 border-${s.color}-300`:'bg-dark-100 border-dark-200'} rounded-lg px-3 py-2 border"><p class="text-lg font-bold ${s.val>=maxVal?`text-${s.color}-700`:'text-dark-500'}">${s.val.toFixed(1)}%</p><p class="text-[10px] ${s.val>=maxVal?`text-${s.color}-600`:'text-dark-400'}">${s.label}</p></div>`
                            ).join('<span class="text-dark-300 text-xs">vs</span>')}</div></div>`;
                    }).join('')}
                </div>
                <div class="bg-dark-50 border border-dark-200 rounded-xl p-4 text-sm text-dark-600"><p class="font-semibold text-dark-800 mb-2">${t('analysis')}</p><p>${t('analysis.method')} <strong>${wLabel}</strong> ${t('analysis.highest')} <strong>${wAvg}%</strong>. ${t('analysis.compare')} Extractive (${extAvg}%) vs Abstractive (${absAvg}%). ${winner === 'extractive' ? t('analysis.ext') : t('analysis.abs')}</p></div>
                ${hasLlm ? `<div class="mt-4 bg-amber-50 border border-amber-200 rounded-xl p-4">
                    <div class="flex items-center gap-2 mb-2"><i data-lucide="sparkles" class="w-4 h-4 text-amber-600"></i><span class="font-semibold text-sm text-amber-800">${t('llm.comp')}</span></div>
                    <p class="text-sm text-dark-700">${escapeHtml(llmText)}</p>
                    <p class="text-xs text-amber-600 mt-2">${t('llm.noeval')}</p>
                </div>` : ''}
            </div>
        </div>`;
        lucide.createIcons();
    }
    function switchEvalDoc(idx) {
        appState.currentDocIndex = idx;
        renderEvaluation(_data);
    }

    // --- INIT ---
    function showNoData() {
        document.getElementById('detail-content').innerHTML = `<div class="no-data-msg"><i data-lucide="alert-circle" class="w-12 h-12 mx-auto text-dark-300"></i><p class="text-lg font-medium text-dark-500 mt-4">${t('detail.nodata')}</p><a href="/" class="inline-flex items-center gap-2 mt-4 px-5 py-2.5 bg-dark-900 text-white rounded-xl text-sm font-medium hover:bg-dark-800 transition-colors"><i data-lucide="arrow-left" class="w-4 h-4"></i> ${t('detail.nodata.btn')}</a></div>`;
        lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Apply saved language
        document.getElementById('lang-label').textContent = currentLang==='id'?'EN':'ID';
        document.documentElement.lang = currentLang;

        // Load state from localStorage
        try {
            const savedState = JSON.parse(localStorage.getItem('nlp_appstate') || 'null');
            if(savedState) {
                appState.texts = savedState.texts || [];
                appState.summaries = savedState.summaries || [];
                appState.currentDocIndex = savedState.currentDocIndex || 0;
            }
            const sumData = JSON.parse(localStorage.getItem('nlp_summarize') || 'null');
            if(sumData) appState.summarizeResult = sumData;
        } catch(e) {}

        // Load step-specific data
        if(_step === 'preprocessing') {
            try { _data = JSON.parse(localStorage.getItem('nlp_preprocess') || 'null'); } catch(e) {}
            if(_data) renderPreprocessing(_data); else showNoData();
        } else if(_step === 'summarization') {
            try { _data = JSON.parse(localStorage.getItem('nlp_summarize') || 'null'); } catch(e) {}
            if(_data) renderSummarization(_data); else showNoData();
        } else if(_step === 'evaluation') {
            try { _data = JSON.parse(localStorage.getItem('nlp_evaluate') || 'null'); } catch(e) {}
            if(_data) renderEvaluation(_data); else showNoData();
        }

        lucide.createIcons();
    });
    </script>
</body>
</html>
